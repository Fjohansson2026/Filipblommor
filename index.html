```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SUPERMEGA BLOM-DETEKTOR 9000</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body{
    background: linear-gradient(45deg, pink, yellow, cyan);
    font-family: Comic Sans MS;
    text-align:center;
}

#låda{
    border:5px dashed purple;
    background:white;
    padding:20px;
    width:350px;
    margin:auto;
    transform:rotate(-2deg);
}

#status{
    font-size:20px;
    color:red;
}

#resultat{
    font-size:25px;
    color:blue;
    margin-top:20px;
}
</style>

</head>

<body>

<h1>🌼 BLOM-GISSAREN 9000 🌼</h1>
<h3>DITT NAMN H – TE22</h3>

<div id="låda">

<div id="status">
🤖 Robot hjärna startar...
</div>

<br>

<input type="file" id="mystiskBildKnapp">

<br><br>

<img id="bildsak" width="224">

<div id="resultat">
Ingen blomma analyserad än 🌱
</div>

</div>

<script>

let superMegaBlomHjärna;

async function startaRobotHjärna(){
    document.getElementById("status").innerHTML = "🧠 Laddar AI-hjärna...";
    
    superMegaBlomHjärna = await tf.loadLayersModel("tfjs_model/model.json");

    document.getElementById("status").innerHTML = "✅ AI-hjärnan är redo att döma dina blommor";
}

startaRobotHjärna();

document.getElementById("mystiskBildKnapp").addEventListener("change", function(event){

    const fil = event.target.files[0];
    const bild = document.getElementById("bildsak");

    bild.src = URL.createObjectURL(fil);

    bild.onload = async function(){

        let superTensorGrej = tf.browser.fromPixels(bild)
        .resizeNearestNeighbor([224,224])
        .toFloat()
        .div(255)
        .expandDims();

        let mystiskaSiffror = await superMegaBlomHjärna.predict(superTensorGrej).data();

        let största = Math.max(...mystiskaSiffror);
        let index = mystiskaSiffror.indexOf(största);

        let blomNamnLista = [
            "🌼 Daisy",
            "🌻 Sunflower",
            "🌹 Rose",
            "🌷 Tulip",
            "🌼 Dandelion"
        ];

        let procent = (största * 100).toFixed(2);

        let text = "🤯 Jag tror det är: " + blomNamnLista[index] + " (" + procent + "%)";

        if(största < 0.5){
            text += " 🚨 MYCKET OSÄKER";
        }
        else if(största < 0.75){
            text += " 🤔 lite osäker";
        }
        else{
            text += " 😎 ganska säker";
        }

        document.getElementById("resultat").innerHTML = text;

    }

});

</script>

</body>
</html>
```
